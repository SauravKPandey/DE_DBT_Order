name: dbt CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Set up profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "${{ secrets.DBT_PROFILES }}" > ~/.dbt/profiles.yml

      - name: Set up GCP keyfile
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /tmp/keyfile.json

      - name: Install dbt packages
        run: dbt deps
        

      - name: dbt compile
        run: dbt compile
        

      - name: dbt test
        run: dbt test
        